server {
    listen 80;
    listen [::]:80;
    server_name your-cloud-public-ip;

    client_max_body_size 64m;
    client_body_timeout 300s;

    # Developer-facing endpoints go through LiteLLM. The proxy itself listens
    # only on loopback; virtual-key auth, quotas, rate limits and spend live there.
    location = /v1/images/generations {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 930s;
        proxy_send_timeout 930s;
        proxy_request_buffering off;
    }

    location = /v1/models {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /v1/stats {
        auth_request /_litellm_virtual_key_auth;
        proxy_pass http://127.0.0.1:8012/internal/gateway/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        include /etc/nginx/snippets/image2-gen-backend-auth.conf;
    }

    # Reuse LiteLLM virtual-key authentication without requiring its Enterprise
    # passthrough-route ACL. This subrequest is internal and returns no body.
    location = /_litellm_virtual_key_auth {
        internal;
        proxy_pass http://127.0.0.1:4000/v1/models;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }

    # This is the LiteLLM passthrough target and must never be public directly.
    location ^~ /internal/gateway/ {
        return 404;
    }

    # Existing leader web UI, asynchronous API, images and authenticated GPU
    # worker endpoints remain on the image service backend.
    location / {
        proxy_pass http://127.0.0.1:8012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30s;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        proxy_request_buffering off;
    }
}
